#db-setup
spring.datasource.url=${DB_URL_LOCALPROD:jdbc:mysql://localhost:3306/HomefirstOne?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata}
spring.datasource.username=${DB_USERNAME_LOCALPROD:root}
spring.datasource.password=${DB_PASSWORD_LOCALPROD:Hffc@123}
