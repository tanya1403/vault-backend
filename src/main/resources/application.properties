spring.application.name=vaultlink-backend
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${SERVER_PORT:8080}
server.shutdown=graceful
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

app.jwt.secret=${JWT_SECRET:local-vaultlink-super-secret-jwt-key-2026-very-secure}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
app.seed.enabled=false
app.seed.username=
app.seed.password=
app.seed.full-name=VaultLink Admin
app.upload.dir=${UPLOAD_DIR:./uploads}

#Root path
#server.servlet.context-path=/youWontReplaceLPT

#Data Source Property
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.generate-ddl=true
spring.jpa.database=mysql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.use-new-id-generator-mappings=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
spring.jpa.hibernate.jdbc.batch_size=100
spring.jpa.hibernate.current_session_context_class=thread
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

spring.devtools.restart.enabled=true

